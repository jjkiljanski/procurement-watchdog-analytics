version: 2

sources:
  - name: raw_silver
    description: >
      Raw copied Silver relations with original upstream column names. In
      DuckDB they are accessed through local parquet-backed models. In BigQuery
      they should point to copied raw Silver tables with the same column names
      as the parquet source.
    schema: "{{ var('silver_schema') }}"
    tables:
      - name: common_envelope
        description: Raw common_envelope relation copied from upstream Silver.

      - name: contract_notice_core
        description: Raw ContractNotice core relation copied from upstream Silver.

      - name: contract_notice_client
        description: Raw ContractNotice client relation copied from upstream Silver.

      - name: contract_notice_part
        description: Raw ContractNotice part relation copied from upstream Silver.

      - name: contract_notice_part_criterion
        description: Raw ContractNotice part_criterion relation copied from upstream Silver.

      - name: tender_result_notice_core
        description: Raw TenderResultNotice core relation copied from upstream Silver.

      - name: tender_result_notice_client
        description: Raw TenderResultNotice client relation copied from upstream Silver.

      - name: tender_result_notice_part
        description: Raw TenderResultNotice part relation copied from upstream Silver.

      - name: contract_performing_notice_core
        description: Raw ContractPerformingNotice core relation copied from upstream Silver.

      - name: contract_performing_notice_part
        description: Raw ContractPerformingNotice part relation copied from upstream Silver.

      - name: contract_performing_notice_change_matter
        description: Raw ContractPerformingNotice change_matter relation copied from upstream Silver.

      - name: notice_update_notice_core
        description: Raw NoticeUpdateNotice core relation copied from upstream Silver.

      - name: notice_update_notice_part
        description: Raw NoticeUpdateNotice part relation copied from upstream Silver.

      - name: notice_update_notice_part_part
        description: Raw NoticeUpdateNotice part_part relation copied from upstream Silver.
