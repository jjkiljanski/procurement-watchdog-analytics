version: 2

models:
  - name: int_procurement__cases
    description: Reusable procurement case grain assembled from canonical Silver inputs.
    columns:
      - name: case_key
        tests:
          - not_null
          - unique
      - name: case_id
      - name: buyer_id

  - name: int_procurement__buyers
    description: Reusable buyer grain assembled from canonical Silver inputs.
    columns:
      - name: buyer_key
        tests:
          - not_null
          - unique
      - name: buyer_id

  - name: int_procurement__contract_notice_part_criteria_counts
    description: Part-grain reusable intermediate model with the number of award criteria per part and per notice for ContractNotice.
    columns:
      - name: cn_part_notice_id
      - name: cn_part_notice_type
      - name: cn_part_publication_date_day
      - name: cn_part_ordinal
      - name: cn_part_short_description
      - name: part_criterion_count
      - name: notice_criterion_count
