  - name: stg_silver__contract_notice_client
    description: Canonical staging contract for the Silver ContractNotice client relation. Contains the parsed data from all the ContractNotice HTML sections that can appear multiple times within one notice AND describe one or more of the buyers issuing the notice (e.g. buyer's address).
    columns:
      - name: cn_client_notice_id
        tests:
          - not_null
      - name: cn_client_notice_type
      - name: cn_client_publication_date_day
      - name: cn_client_name
      - name: cn_client_department
      - name: cn_client_national_id
      - name: cn_client_national_id_type
      - name: cn_client_street
      - name: cn_client_city
      - name: cn_client_postal_code
      - name: cn_client_province
      - name: cn_client_country
      - name: cn_client_nuts3_code
      - name: cn_client_nuts3_name
      - name: cn_client_phone
      - name: cn_client_fax
      - name: cn_client_email
      - name: cn_client_website

  - name: stg_silver__contract_notice_part
    description: Canonical staging contract for the Silver ContractNotice part relation. Contains the parsed part-level data from all the ContractNotice HTML sections that can appear multiple times within one notice AND describe one procurement part (e.g. part scope, value, CPV codes, or award-criteria framework).
    columns:
      - name: cn_part_notice_id
        tests:
          - not_null
      - name: cn_part_notice_type
      - name: cn_part_publication_date_day
      - name: cn_part_ordinal
      - name: cn_part_short_description
      - name: cn_part_buyer_needs_description
      - name: cn_part_is_replenishment
      - name: cn_part_value_amount
      - name: cn_part_value_currency
      - name: cn_part_main_cpv_codes
      - name: cn_part_additional_cpv_codes
      - name: cn_part_has_options
      - name: cn_part_option_scope
      - name: cn_part_duration_days
      - name: cn_part_duration_end_date
      - name: cn_part_has_renewals
      - name: cn_part_renewal_description
      - name: cn_part_has_similar_services_option
      - name: cn_part_similar_services_scope
      - name: cn_part_offer_evaluation_method
      - name: cn_part_award_criteria_weighting_method
      - name: cn_part_award_criteria_summary
      - name: cn_part_award_criteria_include_policy_aspects
      - name: cn_part_award_criteria_policy_aspects_description

  - name: stg_silver__contract_notice_part_criterion
    description: Canonical staging contract for the Silver ContractNotice part criterion relation. Contains the repeated award-criterion rows nested under one procurement part in the ContractNotice.
    columns:
      - name: cn_part_criterion_notice_id
        tests:
          - not_null
      - name: cn_part_criterion_notice_type
      - name: cn_part_criterion_publication_date_day
      - name: cn_part_criterion_part_ordinal
      - name: cn_part_criterion_ordinal
      - name: cn_part_criterion_type
      - name: cn_part_criterion_name
      - name: cn_part_criterion_weight
      - name: cn_part_criterion_order
