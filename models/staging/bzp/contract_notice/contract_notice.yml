version: 2

models:
  - name: stg_silver__contract_notice_core
    description: Canonical staging contract for the Silver ContractNotice core relation. Contains the parsed data from all the ContractNotice HTML sections that can appear just once within one notice (e.g. type of the main buyer issuing the notice).
    columns:
      - name: cn_core_notice_id
        tests:
          - not_null
      - name: cn_core_notice_type
      - name: cn_core_publication_date_day
      - name: cn_procedure_conduct_mode
        description: >
          Whether the procedure is conducted directly by the buyer,
          jointly by multiple buyers, or by an entrusted entity.
        tests:
          - accepted_values:
              arguments:
                values: ['samodzielnie', 'wspólnie', 'powierzono']
      - name: cn_buyer_type
        description: >
          The type of the main buyer issuing the notice (e.g. public buyer in the public finances sector, sector buyer, etc.). Extracted from the relevant section of the notice if available.
      - name: cn_buyer_main_activity
      - name: cn_joint_procurement_responsibility_split
      - name: cn_procedure_operator_name
      - name: cn_procedure_operator_national_id
        tests:
          - matches_regex:
              arguments:
                pattern: '^[0-9]+$'
      - name: cn_procedure_operator_national_id_type
        tests:
          - accepted_values:
              arguments:
                values: ['REGON', 'NIP', 'PESEL', 'other']
      - name: cn_procedure_operator_street
      - name: cn_procedure_operator_city
      - name: cn_procedure_operator_postal_code
        tests:
          - matches_regex:
              arguments:
                pattern: '^[0-9]{2}-[0-9]{3}$'
      - name: cn_procedure_operator_province
      - name: cn_procedure_operator_country
      - name: cn_procedure_operator_nuts3_code
        tests:
          - matches_regex:
              arguments:
                pattern: '^PL[0-9]{2}[A-Z0-9]$'
      - name: cn_procedure_operator_nuts3_name
      - name: cn_procedure_operator_phone
      - name: cn_procedure_operator_fax
      - name: cn_procedure_operator_email
      - name: cn_procedure_operator_website
      - name: cn_notice_subject
        tests:
          - accepted_values:
              arguments:
                values: ['Zamówienia publicznego', 'Umowy ramowej']
      - name: cn_is_social_service_notice
      - name: cn_contract_title
      - name: cn_procedure_ocid
      - name: cn_notice_number
      - name: cn_notice_version
      - name: cn_notice_date
      - name: cn_is_in_procurement_plan
      - name: cn_procurement_plan_number
      - name: cn_procurement_plan_item_identifier
      - name: cn_is_reserved_contract
      - name: cn_reserved_contract_eligible_contractor_types
      - name: cn_is_reserved_social_service_contract
      - name: cn_is_eu_funded
      - name: cn_eu_funding_program_name
      - name: cn_award_procedure_legal_basis
      - name: cn_framework_agreement_legal_basis
      - name: cn_procedure_website_url
      - name: cn_has_restricted_procurement_documents
      - name: cn_restricted_documents_access_info
      - name: cn_requires_electronic_submission
      - name: cn_electronic_communication_url
      - name: cn_electronic_communication_requirements
      - name: cn_non_general_tools_access_url
      - name: cn_requires_non_general_electronic_tools
      - name: cn_non_general_tools_access_method
      - name: cn_non_electronic_communication_reason
      - name: cn_non_electronic_submission_method
      - name: cn_electronic_catalog_requirement
      - name: cn_submission_languages
      - name: cn_gdpr_information_clause
      - name: cn_gdpr_limitation_clause
      - name: cn_had_market_consultations
      - name: cn_reference_number
      - name: cn_contract_type
      - name: cn_is_split_into_separate_lots
      - name: cn_total_lots_value_amount
      - name: cn_total_lots_value_currency
      - name: cn_procedure_value_amount
      - name: cn_procedure_value_currency
      - name: cn_framework_agreement_value_amount
      - name: cn_framework_agreement_value_currency
      - name: cn_allows_partial_offers
      - name: cn_number_of_lots
      - name: cn_limits_lots_per_bidder
      - name: cn_max_lots_per_bidder
      - name: cn_has_social_environmental_label_requirements
      - name: cn_social_environmental_label_requirements_description
      - name: cn_has_optional_exclusion_grounds
      - name: cn_optional_exclusion_grounds
      - name: cn_has_participation_conditions
      - name: cn_participation_conditions_description
      - name: cn_requires_art_125_declaration
      - name: cn_exclusion_evidence_requirements
      - name: cn_participation_conditions_evidence_requirements
      - name: cn_subject_matter_evidence_requirements
      - name: cn_allows_subject_matter_evidence_completion
      - name: cn_subject_matter_evidence_completion_scope
      - name: cn_other_required_documents
      - name: cn_allows_variant_offers
      - name: cn_variant_offer_submission_rules
      - name: cn_has_electronic_auction
      - name: cn_electronic_auction_url
      - name: cn_electronic_auction_description
