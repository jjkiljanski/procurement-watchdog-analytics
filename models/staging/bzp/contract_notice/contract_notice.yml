      - name: cn_offer_submission_place
      - name: cn_offer_opening_datetime
      - name: cn_offer_binding_deadline
      - name: cn_allows_negotiated_selection
      - name: cn_max_bidders_invited_to_negotiation
      - name: cn_negotiation_shortlisting_criteria
