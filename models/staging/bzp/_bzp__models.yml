version: 2

models:
  - name: stg_bzp__common_envelope
    description: Thin staging layer over the lakehouse common envelope.
    columns:
      - name: notice_id
        tests:
          - not_null
      - name: case_id
      - name: notice_type
      - name: publication_date

  - name: stg_bzp__case_derived_facts
    description: Thin staging layer over case-level Silver derived facts.
    columns:
      - name: case_id
        tests:
          - not_null
      - name: buyer_id
      - name: buyer_name

  - name: stg_bzp__notice_type_core
    description: Optional staging layer for unified notice-type core rows.
    columns:
      - name: notice_id
      - name: case_id
      - name: notice_type
