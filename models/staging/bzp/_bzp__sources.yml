version: 2

sources:
  - name: warehouse_bzp
    description: >
      Warehouse-facing source mappings for BZP-derived Silver assets produced by
      the upstream lakehouse. Replace schema and identifiers to match the target
      adapter and environment.
    schema: "{{ var('silver_schema') }}"
    tables:
      - name: silver_common_envelope
        identifier: bzp_common_envelope
        description: Common Silver envelope for BZP notices.
        columns:
          - name: notice_id
            description: Stable notice identifier in the warehouse.
            tests:
              - not_null

      - name: silver_case_derived_facts
        identifier: bzp_case_derived_facts
        description: Case-level Silver derived facts from the lakehouse.
        columns:
          - name: case_id
            description: Stable procurement case identifier.
            tests:
              - not_null

      - name: silver_notice_type_core
        identifier: bzp_notice_type_core
        description: >
          Optional flattened or unioned exposure of notice type core tables.
          This is a temporary simplification for the initial dbt scaffold.
