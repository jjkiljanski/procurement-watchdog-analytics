version: 2

models:
  - name: stg_silver__common_envelope
    description: Canonical staging contract for the Silver common envelope relation.
    columns:
      - name: notice_id
        tests:
          - not_null
      - name: case_id
      - name: notice_type
      - name: publication_date

  - name: stg_silver__contract_notice_core
    description: Canonical staging contract for the Silver ContractNotice core relation.
    columns:
      - name: notice_id
        tests:
          - not_null
      - name: notice_type
      - name: publication_date_day

  - name: stg_silver__contract_notice_client
    description: Canonical staging contract for the Silver ContractNotice client relation.
    columns:
      - name: notice_id
        tests:
          - not_null
      - name: notice_type
      - name: publication_date_day

  - name: stg_silver__contract_notice_part
    description: Canonical staging contract for the Silver ContractNotice part relation.
    columns:
      - name: notice_id
        tests:
          - not_null
      - name: notice_type
      - name: publication_date_day
